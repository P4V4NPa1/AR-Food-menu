<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Food Menu v1.1</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
margin:0;
background:#fafafa;
color:#222;
}

header{
text-align:center;
padding:20px;
background:white;
border-bottom:1px solid #eee;
}

h1{
margin:0;
font-size:24px;
}

.subtitle{
color:#666;
margin-top:5px;
}

.container{
max-width:700px;
margin:30px auto;
padding:0 20px 30px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.card h2{
margin-top:0;
margin-bottom:8px;
font-size:20px;
}

.card p{
color:#666;
font-size:14px;
margin-bottom:15px;
}

model-viewer{
width:100%;
height:380px;
background:#f3f3f3;
border-radius:12px;
}

footer{
text-align:center;
padding:25px;
color:#777;
font-size:13px;
}

.ar-button{
background:#ff6b35;
border-radius:12px;
border:none;
position:absolute;
bottom:16px;
left:50%;
transform:translateX(-50%);
color:white;
padding:12px 18px;
font-size:15px;
cursor:pointer;
}

.ar-button:hover{
background:#e85b27;
}

</style>
</head>

<body>

<header>

<h1>AR Food Menu</h1>

<p class="subtitle">
Place the dish on your table and see it in real life size
</p>

</header>

<div class="container">

<div class="card">

<h2>Pizza</h2>

<p>Preview the dish in 3D, then place it in AR.</p>

<model-viewer
src="models/Pizza.glb"
ios-src="models/Pizzaios.usdz"
ar
ar-modes="scene-viewer quick-look webxr"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1">

<button slot="ar-button" class="ar-button">
View in AR
</button>

</model-viewer>

</div>

</div>

<footer>

Scan. Place. Experience. 🍕

</footer>

</body>
</html>
