<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indian Restaurant AR Menu</title>

  <!-- Model Viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #fafafa;
      color: #222;
    }

    header {
      padding: 20px;
      text-align: center;
      background: white;
      border-bottom: 1px solid #eee;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    p.subtitle {
      color: #666;
      margin-top: 6px;
    }

    .menu-container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .dish-card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    }

    .dish-card h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 20px;
    }

    .dish-card p {
      color: #666;
      font-size: 14px;
      margin-bottom: 15px;
    }

    model-viewer {
      width: 100%;
      height: 350px;
      background: #f3f3f3;
      border-radius: 14px;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #ff6b35;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #e85b27;
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    <h1>Indian Restaurant AR Menu</h1>
    <p class="subtitle">Place the dish on your table and see its real size</p>
  </header>

  <div class="menu-container">

    <div class="dish-card">
      <h2>Pizza</h2>
      <p>Creamy tomato-based curry served in a traditional bowl.</p>

      <model-viewer
        src="Pizza.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1">
      </model-viewer>

      <button onclick="this.parentElement.querySelector('model-viewer').activateAR()">
        View in AR
      </button>
    </div>

  </div>

  <footer>
    Scan. Place. Experience. 🍛
  </footer>

</body>
</html>
