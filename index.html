<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Food Menu ver1</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: #fafafa;
      color: #222;
    }

    header {
      text-align: center;
      padding: 20px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .subtitle {
      color: #666;
      margin-top: 5px;
    }

    .container {
      max-width: 700px;
      margin: 30px auto;
      padding: 0 20px 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 20px;
    }

    .card p {
      color: #666;
      font-size: 14px;
      margin-bottom: 15px;
    }

    model-viewer {
      width: 100%;
      height: 380px;
      background: #f3f3f3;
      border-radius: 12px;
      display: block;
    }

    .ar-link {
      display: block;
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #ff6b35;
      color: white;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      box-sizing: border-box;
    }

    .ar-link:hover {
      background: #e85b27;
    }

    footer {
      text-align: center;
      padding: 25px;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <h1>AR Food Menu</h1>
    <p class="subtitle">Place the dish on your table and see it in real life size</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>Pizza</h2>
      <p>Preview in 3D, then open it in AR.</p>

      <model-viewer
        src="models/Pizza.glb"
        alt="Pizza 3D model"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1">
      </model-viewer>

      <a class="ar-link" rel="ar" href="models/Pizzaios.usdz">
        View in AR
      </a>
    </div>
  </div>

  <footer>
    Scan. Place. Experience. 🍕
  </footer>
</body>
</html>
