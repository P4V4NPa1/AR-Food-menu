<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Indian Restaurant AR Menu</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
margin:0;
background:#fafafa;
color:#222;
}

header{
text-align:center;
padding:20px;
background:white;
border-bottom:1px solid #eee;
}

h1{
margin:0;
font-size:24px;
}

.subtitle{
color:#666;
margin-top:5px;
}

.container{
max-width:1100px;
margin:auto;
padding:30px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.card h2{
margin-top:0;
margin-bottom:8px;
font-size:20px;
}

.card p{
color:#666;
font-size:14px;
}

model-viewer{
width:100%;
height:340px;
background:#f3f3f3;
border-radius:12px;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#ff6b35;
color:white;
font-size:15px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#e85b27;
}

footer{
text-align:center;
padding:25px;
color:#777;
font-size:13px;
}

</style>
</head>

<body>

<header>

<h1>Indian Restaurant AR Menu</h1>

<p class="subtitle">
Place the dish on your table and see it in real life size
</p>

</header>

<div class="container">


<!-- Butter Chicken -->

<div class="card">

<h2>Butter Chicken</h2>

<p>Creamy tomato-based curry served in a bowl.</p>

<model-viewer
src="models/Pizza.glb"
ios-src="models/Pizzaios.usdz"
ar
ar-modes="quick-look webxr scene-viewer"
quick-look-browsers="safari"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1">

</model-viewer>

<button onclick="this.parentElement.querySelector('model-viewer').activateAR()">
View in AR
</button>

</div>


<!-- Biryani -->

<div class="card">

<h2>Biryani</h2>

<p>Fragrant basmati rice layered with spices.</p>

<model-viewer
src="models/Pizza.glb"
ios-src="models/Pizzaios.usdz"
ar
ar-modes="quick-look webxr scene-viewer"
quick-look-browsers="safari"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1">

</model-viewer>

<button onclick="this.parentElement.querySelector('model-viewer').activateAR()">
View in AR
</button>

</div>


</div>

<footer>

Scan. Place. Experience. 🍛

</footer>

</body>
</html>
